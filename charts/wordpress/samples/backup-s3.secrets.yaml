## Sample: rclone config secret for S3 backup
## Create this Secret before enabling backup.s3:
##   kubectl create secret generic my-rclone-config \
##     --from-file=rclone.conf=./rclone.conf

apiVersion: v1
kind: Secret
metadata:
  name: my-rclone-config
type: Opaque
stringData:
  rclone.conf: |
    [s3]
    type = s3
    provider = AWS
    region = eu-central-1
    access_key_id = AKIA...
    secret_access_key = ...
