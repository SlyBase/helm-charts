apiVersion: v2
name: wordpress
description: >-
  Using the official WordPress image. This chart provides automation for
  installation, user management, plugin installation, and metrics.
type: application
version: 4.6.7
appVersion: 7.0.0
icon: >-
  https://raw.githubusercontent.com/slydlake/helm-charts/refs/heads/main/charts/wordpress/app.png
home: https://github.com/slydlake/helm-charts
maintainers:
  - name: slydlake
sources:
  - https://github.com/slydlake/helm-charts
annotations:
  artifacthub.io/category: networking
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: SlyCharts GitHub Repository
      url: https://github.com/slydlake/helm-charts/tree/main/charts/wordpress
    - name: Official WordPress Repository
      url: https://github.com/docker-library/
    - name: "SlyMetrics WordPress plugin for Prometheus Metrics"
      url: https://github.com/slydlake/slymetrics
    - name: Apache Metrics container
      url: https://github.com/Lusitaniae/apache_exporter
  artifacthub.io/maintainers: |
    - name: slydlake
      email: sly.dlake@gmail.com
  artifacthub.io/changes: |
    - kind: fixed
      description: "deps: update subchart/wordpress/redis/0.30.4 to v0.30.4"
      links:
        - name: GitHub
          url: https://github.com/SlyBase/helm-charts/commit/9cb69bc579e933af11fb71d284ad7cfedd124cbb
    - kind: fixed
      description: "deps: update subchart/wordpress/valkey/0.22.0 to v0.22.0"
      links:
        - name: GitHub
          url: https://github.com/SlyBase/helm-charts/commit/801cae7c0fd14ed7e89ee56b73dc736463bcbf5b
  artifacthub.io/images: |
    - name: wordpress
      image: docker.io/wordpress:7.0.0-php8.3-apache
    - name: wordpress-cli
      image: docker.io/wordpress:cli-2.12.0-php8.3
    - name: metrics-apache
      image: docker.io/lusotycoon/apache-exporter:v1.0.12
    - name: mariadb
      image: docker.io/mariadb:12.3.2-noble
    - name: memcached
      image: docker.io/memcached:1.6.42
    - name: redis
      image: docker.io/redis:8.8.0-trixie
    - name: valkey
      image: docker.io/valkey/valkey:9.1.0-trixie
dependencies:
  - condition: memcached.enabled
    name: memcached
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.13.3
  - condition: redis.enabled
    name: redis
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.30.4
  - condition: valkey.enabled
    name: valkey
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.22.0
  - condition: mariadb.enabled
    name: mariadb
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.16.5
keywords:
  - wordpress
  - blog
