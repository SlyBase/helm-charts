apiVersion: v2
name: wordpress
description: >-
  Using the official WordPress image. This chart provides automation for
  installation, user management, plugin installation, and metrics.
type: application
version: 5.1.20
appVersion: 7.0.0
icon: >-
  https://raw.githubusercontent.com/slydlake/helm-charts/refs/heads/main/charts/wordpress/app.png
home: https://github.com/slydlake/helm-charts
maintainers:
  - name: slydlake
sources:
  - https://github.com/slydlake/helm-charts
annotations:
  artifacthub.io/category: networking
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: SlyCharts GitHub Repository
      url: https://github.com/slydlake/helm-charts/tree/main/charts/wordpress
    - name: Official WordPress Repository
      url: https://github.com/docker-library/
    - name: "SlyMetrics WordPress plugin for Prometheus Metrics"
      url: https://github.com/slydlake/slymetrics
    - name: Apache Metrics container
      url: https://github.com/Lusitaniae/apache_exporter
  artifacthub.io/maintainers: |
    - name: slydlake
      email: sly.dlake@gmail.com
  artifacthub.io/changes: |
    - kind: fixed
      description: "deps: update docker.io/memcached:1.6.45 docker digest to dc561d5"
      links:
        - name: GitHub
          url: https://github.com/SlyBase/helm-charts/commit/361bf37fa800844a83bd8f608b29dbe900bcdb6c
    - kind: fixed
      description: "deps: update docker.io/redis:8.8.0-trixie docker digest to 0b13f54"
      links:
        - name: GitHub
          url: https://github.com/SlyBase/helm-charts/commit/af505131bff412a0cc9940cff8d4cd482835c508
    - kind: fixed
      description: "deps: update docker.io/wordpress:7.0.1-php8.3-apache docker digest to cc795f5"
      links:
        - name: GitHub
          url: https://github.com/SlyBase/helm-charts/commit/51587f030e349f9e642ffbea5bc2bbb6dcbce0c1
    - kind: fixed
      description: "deps: update memcached docker tag to v0.14.2"
      links:
        - name: GitHub
          url: https://github.com/SlyBase/helm-charts/commit/e803ac00bcba19d06319bc93ff9745daaafff928
    - kind: fixed
      description: "deps: update redis docker tag to v0.32.2"
      links:
        - name: GitHub
          url: https://github.com/SlyBase/helm-charts/commit/55e5a98a07130cd2c5a20d079f42ae0150cdc923
  artifacthub.io/images: |
    - name: wordpress
      image: docker.io/wordpress:7.0.1-php8.3-apache
    - name: wordpress-cli
      image: docker.io/wordpress:cli-2.12.0-php8.3
    - name: metrics-apache
      image: docker.io/lusotycoon/apache-exporter:v1.1.1
    - name: mariadb
      image: docker.io/mariadb:12.3.2-noble
    - name: memcached
      image: docker.io/memcached:1.6.45
    - name: redis
      image: docker.io/redis:8.8.0-trixie
    - name: valkey
      image: docker.io/valkey/valkey:9.1.0-trixie
dependencies:
  - condition: memcached.enabled
    name: memcached
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.14.2
  - condition: redis.enabled
    name: redis
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.32.2
  - condition: valkey.enabled
    name: valkey
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.24.1
  - condition: mariadb.enabled
    name: mariadb
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.16.6
keywords:
  - wordpress
  - blog
