## @section Global parameters

## @param controllerType string Workload controller: "deployment" (shared PVC) or "statefulset" (per-Pod RWO volume via volumeClaimTemplates)
controllerType: deployment

## @param replicaCount int Number of replicas for the deployment
replicaCount: 1

## @section StatefulSet parameters (only used when controllerType=statefulset)
statefulset:
  ## @param statefulset.podManagementPolicy string Pod management policy (Parallel for independent Pods, OrderedReady to serialize startup)
  podManagementPolicy: Parallel
  ## @param statefulset.updateStrategy object Update strategy for the StatefulSet
  updateStrategy:
    type: RollingUpdate
  ## @param statefulset.persistentVolumeClaimRetentionPolicy object Retention policy for per-Pod PVCs on scale-down/delete
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain

## @section Image parameters
image:
  ## @param image.registry string WordPress container image registry
  registry: docker.io
  ## @param image.repository string WordPress container image repository
  repository: wordpress
  ## @param image.tag string Image tag (default is the chart appVersion)
  tag: "7.0.1-php8.3-apache@sha256:cc795f5862b2f3891a805106917089558eef28a56755bd8ac8308d1ab57b28d7"
  ## @param image.pullPolicy string Image pull policy
  pullPolicy: IfNotPresent

## @param imagePullSecrets list Secrets for pulling images from private repository
imagePullSecrets: []

## @param nameOverride string String to partially override the chart name
nameOverride: ""

## @param fullnameOverride string String to fully override the chart name
fullnameOverride: ""

## @param clusterDomain string Kubernetes Cluster Domain
clusterDomain: cluster.local

## @section DNS and Network parameters
## @descriptionStart
## DNS policy and configuration of the pod.
## E.g.
## ```yaml
## dnsPolicy: None
## dnsConfig:
##   searches:
##     - svc.cluster.local
##     - cluster.local
##   nameservers:
##     - 1.1.1.1
##     - 8.8.8.8
##
## hostNetwork: true
## ```
## @descriptionEnd

## @extra dnsPolicy string DNS policy for the pod (ClusterFirst, None, ClusterFirstWithHostNet, Default)
## @extra dnsConfig object DNS configuration for the pod (nameservers, searches, options)
## @extra hostNetwork bool Use the host's network namespace

## @section Deployment parameters

## @param customLabels object Additional labels for deployment (Deployment only — use commonLabels for all resources)
customLabels: {}

## @param customAnnotations object Additional annotations for deployment (Deployment only — use commonAnnotations for all resources)
customAnnotations: {}

## @section Common metadata
## @param commonLabels object Labels applied to ALL resources (Service, Ingress, PVC, ServiceMonitor, HPA, PDB, ...)
commonLabels: {}
## @param commonAnnotations object Annotations applied to ALL resources
commonAnnotations: {}

## @section Deployment strategy
## @descriptionStart
## NOTE: Set it to `Recreate` if you use a PersistentVolume that cannot be mounted on multiple pods.
## E.g.
## ```yaml
## updateStrategy:
##   type: Recreate
## ```
## Or with rolling update settings:
## ```yaml
## updateStrategy:
##   type: RollingUpdate
##   rollingUpdate:
##     maxSurge: 25%
##     maxUnavailable: 25%
## ```
## @descriptionEnd
updateStrategy:
  ## @param updateStrategy.type string Deployment strategy type (RollingUpdate or Recreate)
  type: Recreate

## @section Init and Sidecar Containers
## @descriptionStart
## Add init containers or sidecars to the pod.
## E.g.
## ```yaml
## initContainers:
##   - name: init-permissions
##     image: busybox
##     command: ["sh", "-c", "chown -R 33:33 /var/www/html"]
##     volumeMounts:
##       - name: wordpress-data
##         mountPath: /var/www/html
##
## sidecars:
##   - name: redis
##     image: redis:alpine
##     ports:
##       - containerPort: 6379
## ```
## @descriptionEnd

## @param initContainers list Init containers to run before the main container
initContainers: []

## @param sidecars list Sidecar containers to run alongside the main container
sidecars: []

## @param command list Override default container command
command: []

## @param args list Override default container args (useful when using custom images)
args: []

## @section Environment variables
## @descriptionStart
## Extra environment variables for the WordPress container.
## E.g.
## ```yaml
## extraEnvVars:
##   - name: PHP_MEMORY_LIMIT
##     value: "256M"
##   - name: PHP_MAX_EXECUTION_TIME
##     value: "300"
##   - name: WORDPRESS_DEBUG
##     value: "1"
## ```
## @descriptionEnd

## @param extraEnvVars list Extra environment variables to set in the container
extraEnvVars: []

## @param extraEnvVarsSecret string Name of existing Secret containing extra env vars
extraEnvVarsSecret: ""

## @param extraEnvVarsCM string Name of existing ConfigMap containing extra env vars
extraEnvVarsCM: ""

## @section WordPress configuration
wordpress:
  ## @section WordPress initialization settings
  ## @descriptionStart
  ## These settings are set with an init container.
  ## Note: The init container itself always runs — it manages plugins, themes, MU-plugins and configuration on every pod start.
  ## wordpress.init.enabled only controls the automatic WordPress core installation (wp core install) inside it:
  ##   - true: install WordPress on first start (admin user, title, optional multisite); if WordPress is already installed,
  ##     the installation is skipped, but firstname, lastname, language, permalinks, plugins and users are still applied.
  ##   - false (default): no automatic installation — the chart expects an already-installed WordPress database
  ##     (e.g. migration / external DB). On an empty database the init container fails fast with instructions.
  ##     language, permalinks and the init.* admin settings are NOT applied in this mode.
  ## @descriptionEnd
  init:
    ## @section Init container image
    image:
      ## @param wordpress.init.image.registry string Container image registry for init container
      registry: docker.io
      ## @param wordpress.init.image.repository string Container image repository for init container
      repository: wordpress
      ## @param wordpress.init.image.tag string Image tag for init container
      tag: "cli-2.12.0-php8.3@sha256:f8aeb68164c6a04f5dcc91da30d8ffa096b0f7fafb7a65f144c2dd62587caca0"
      ## @param wordpress.init.image.pullPolicy string Image pull policy for init container
      pullPolicy: IfNotPresent

    ## @param wordpress.init.enabled bool Enable automatic WordPress core installation on first start (the init container itself always runs; when false, an already-installed WordPress database is expected)
    enabled: false
    ## @param wordpress.init.existingSecret string Existing secret with keys: wordpress.username, wordpress.password, wordpress.email
    existingSecret: ""
    ## @section Existing Secret Keys
    secretKeys:
      ## @param wordpress.init.secretKeys.userUsernameKey string Key for username in existing secret
      userUsernameKey: wordpress.username
      ## @param wordpress.init.secretKeys.userPasswordKey string Key for password in existing secret
      userPasswordKey: wordpress.password
      ## @param wordpress.init.secretKeys.userEmailKey string Key for email in existing secret
      userEmailKey: wordpress.email
    ## @param wordpress.init.username string WordPress admin username
    username: ""
    ## @param wordpress.init.password string WordPress admin password
    password: ""
    ## @param wordpress.init.email string WordPress admin email
    email: ""
    ## @param wordpress.init.firstname string WordPress admin first name
    firstname: ""
    ## @param wordpress.init.lastname string WordPress admin last name
    lastname: ""
    ## @param wordpress.init.title string WordPress blog title
    title: ""
    ## @param wordpress.init.debug bool Enable debug mode in Job "setter"
    debug: false

    ## @section Multisite configuration
    multiSites:
      ## @param wordpress.init.multiSites.enabled bool Enable multisite configuration
      enabled: false
      ## @param wordpress.init.multiSites.title string Title for the multisite network (required if multiSites.enabled is true)
      title: ""
      ## @param wordpress.init.multiSites.subdomain bool Use subdomain configuration (true) or subdirectory (false)
      subdomain: false

      ## @param wordpress.init.multiSites.prune bool Remove all sites not defined in wordpress.init.multiSites.sites list
      prune: false

      ## @param wordpress.init.multiSites.sites list List of sites to create
      ## E.g.
      ## ```yaml
      ##  sites:
      ##  - name: blog          # mandatory, site slug (e.g. blog → example.com/blog or blog.example.com)
      ##    title: "Blog"       # optional, site title (default: same as name)
      ##    private: false       # optional, not indexed by search engines (default: false)
      ##    active: true         # optional, site is active (default: true)
      ##    archived: false      # optional, site is archived (default: false)
      ##  - name: shop
      ##    title: "Online Shop"
      ## ```
      sites: []

    ## @section JWT Authentication configuration
    ## @descriptionStart
    ## When enabled, installs the `jwt-authentication-for-wp-rest-api` plugin (wordpress.org/plugins/jwt-authentication-for-wp-rest-api)
    ## and injects define('JWT_AUTH_SECRET_KEY', ...) into wp-config.php via the main chart secret.
    ## Requires wordpress.configExtraInject: true (default).
    ## @descriptionEnd
    jwt:
      ## @param wordpress.init.jwt.enabled bool Enable JWT Authentication (installs jwt-authentication-for-wp-rest-api plugin)
      enabled: false
      ## @param wordpress.init.jwt.secret string Inline JWT signing secret (auto-generated and preserved across helm upgrades if empty; ignored when existingSecret is set)
      secret: ""
      ## @param wordpress.init.jwt.existingSecret string Name of an existing Secret containing the JWT signing key
      existingSecret: ""
      ## @param wordpress.init.jwt.secretKey string Key within existingSecret that holds the JWT signing key
      secretKey: "JWT_AUTH_SECRET_KEY"

    ## @param wordpress.init.applicationPassword object Create an Application Password for the admin user via a Helm hook Job
    ## @descriptionStart
    ## When set, a post-install/post-upgrade Job creates an Application Password for the admin user
    ## and stores username, application password, and site URL in a Kubernetes Secret.
    ## The Secret persists after helm uninstall.
    ## E.g.
    ## ```yaml
    ## applicationPassword:
    ##   name: "MCP Access"
    ##   outputSecret:
    ##     name: ""            # empty = <release>-token-<adminUsername>
    ##     usernameKey: "WP_USERNAME"
    ##     passwordKey: "WP_APP_PASSWORD"
    ##     urlKey: "WP_SITE_URL"
    ## ```
    ## @descriptionEnd
    applicationPassword: {}

    ## @section Custom init script
    customInitScript: ""
    ## @section Custom init commands
    customInitConfigMap:
      ## @param wordpress.init.customInitConfigMap.name string Name of ConfigMap with custom init commands
      name: ""
      ## @param wordpress.init.customInitConfigMap.key string Key in ConfigMap containing custom init commands
      key: "commands.sh"

  ## @section WordPress general settings
  ## @descriptionStart
  ## Permalink structure options: plain, dayAndName, monthAndName, numeric, postName, or custom
  ## Available tags: %year% %monthnum% %day% %hour% %minute% %second% %post_id% %postname% %category% %author%
  ## Note: If metrics.wordpress.enabled = true, you must use any setting other than plain
  ## @descriptionEnd
  permalinks:
    ## @param wordpress.permalinks.structure string Permalink structure (plain, dayAndName, monthAndName, numeric, postName)
    structure: postName
    ## @extra wordpress.permalinks.customStructure string Custom permalink structure (overrides structure)

  ## @param wordpress.plugins list WordPress plugins to install (name, version, activate, autoupdate, networkActivate, sites)
  ## E.g.
  ## ```yaml
  ## plugins:
  ##   - name: woocommerce
  ##     version: latest
  ##     activate: true
  ##     autoupdate: true
  ##     networkActivate: true   # Multisite: activate on all sites (default if multisite enabled)
  ##   - name: contact-form-7
  ##     activate: true
  ##     sites:                  # Multisite: activate only on these sites (overrides networkActivate)
  ##       - blog
  ##       - shop
  ##   - name: akismet
  ##     activate: false
  ## ```
  plugins: []

  ## @param wordpress.pluginsPrune bool Remove all plugins not defined in wordpress.plugins list
  pluginsPrune: false

  ## @param wordpress.themes list WordPress themes to install (name, version, activate, autoupdate, networkEnable, sites)
  ## E.g.
  ## ```yaml
  ## themes:
  ##   - name: flavor
  ##     version: 1.0.4
  ##     activate: true
  ##     autoupdate: true
  ##     networkEnable: true     # Multisite: enable on network (default: true if multisite)
  ##   - name: flavor-child
  ##     source: "https://example.com/flavor-child.zip"
  ##     activate: true
  ##     sites:                  # Multisite: activate on specific sites
  ##       - blog
  ## ```
  themes: []

  ## @param wordpress.themesPrune bool Remove all themes not defined in wordpress.themes list
  themesPrune: false

  ## @section Composer configuration
  ## @descriptionStart
  ## Default repositories: wpackagist.org (WordPress.org mirror).
  ## Add custom repos for private/premium plugins from GitHub, GitLab, Satis, etc.
  ## Composer packages listed under wordpress.plugins or wordpress.themes are
  ## explicitly mapped into wp-content/plugins or wp-content/themes, even when
  ## upstream packages use type: library.
  ## E.g.
  ## ```yaml
  ## composer:
  ##   repositories:
  ##     - type: composer
  ##       url: https://connect.developer.deliciousbrains.com
  ##     - type: vcs
  ##       url: https://github.com/my-org/my-private-plugin
  ## ```
  ## @descriptionEnd
  composer:
    ## @param wordpress.composer.repositories list Custom Composer repositories to add
    repositories: []

  ## @param wordpress.users list WordPress users to create (username, email, displayname, firstname, lastname, role, sendEmail, superAdmin, sites, applicationPassword)
  ## E.g.
  ## ```yaml
  ## users:
  ##   - username: editor
  ##     email: editor@example.com
  ##     displayname: "John Editor"
  ##     firstname: John
  ##     lastname: Editor
  ##     role: editor            # Possible values: 'administrator', 'editor', 'author', 'contributor', 'subscriber'
  ##     sendEmail: false
  ##     superAdmin: false       # Multisite: grant super-admin privileges (default: false)
  ##     sites:                  # Multisite: assign to specific sites with roles
  ##       - name: blog
  ##         role: editor
  ##       - name: shop
  ##         role: administrator
  ##     applicationPassword:    # optional: create Application Password, store in K8s Secret
  ##       name: "MCP Access"
  ##       outputSecret:
  ##         name: ""            # empty = <release>-token-<username>
  ##         usernameKey: "WP_USERNAME"
  ##         passwordKey: "WP_APP_PASSWORD"
  ##         urlKey: "WP_SITE_URL"
  ##   - username: author
  ##     email: author@example.com
  ##     role: author
  ## ```
  users: []

  ## @param wordpress.tablePrefix string Prefix for WordPress database tables
  tablePrefix: wp_
  ## @param wordpress.language string WordPress language (e.g. de_DE, default: en_US)
  language: ""
  ## @param wordpress.url string WordPress URL (used for WP_HOME and WP_SITEURL)
  url: ""

  ## @param wordpress.configExtraInject bool Automatically inject essential wp-config.php constants
  ## @descriptionStart
  ## When true, the following are ALWAYS appended to WORDPRESS_CONFIG_EXTRA, even when
  ## configExtra, configExtraConfigMap, or configExtraSecret is set by the user:
  ##   - WP_HOME and WP_SITEURL (from wordpress.url)
  ##   - Multisite constants (MULTISITE, SUBDOMAIN_INSTALL, DOMAIN_CURRENT_SITE, etc.) when multiSites.enabled
  ##   - Memcached config (when memcached.enabled and memcached.createConfig)
  ## This fixes an existing issue where WP_HOME/WP_SITEURL are lost when using configExtraConfigMap or configExtraSecret.
  ## @descriptionEnd
  ## @default true
  configExtraInject: true

  ## @param wordpress.configExtra string Custom values for wp-config.php (WP_HOME/WP_SITEURL added automatically)
  ## E.g.
  ## ```yaml
  ## configExtra: |
  ##   define('WP_MEMORY_LIMIT', '256M');
  ##   define('WP_MAX_MEMORY_LIMIT', '512M');
  ##   define('DISALLOW_FILE_EDIT', true);
  ##   define('WP_AUTO_UPDATE_CORE', false);
  ## ```
  configExtra: ""

  ## @section ConfigMap for wp-config.php (overrides wordpress.configExtra)
  configExtraConfigMap:
    ## @param wordpress.configExtraConfigMap.name string Name of existing ConfigMap
    name: ""
    ## @param wordpress.configExtraConfigMap.key string Key in ConfigMap containing extra wp-config.php values
    key: "wordpress.configExtra"

  ## @section Secret for wp-config.php (overrides configExtra and configExtraConfigMap)
  configExtraSecret:
    ## @param wordpress.configExtraSecret.name string Name of existing Secret
    name: ""
    ## @param wordpress.configExtraSecret.key string Key in Secret containing extra wp-config.php values
    key: "wordpress.configExtra"

  ## @param wordpress.htaccess string Custom .htaccess file (server-status rewrite added automatically if metrics.apache.createConfig is true)
  ## E.g.
  ## ```yaml
  ## htaccess: |
  ##   # BEGIN WordPress
  ##   <IfModule mod_rewrite.c>
  ##   RewriteEngine On
  ##   RewriteBase /
  ##   RewriteRule ^index\.php$ - [L]
  ##   RewriteCond %{REQUEST_FILENAME} !-f
  ##   RewriteCond %{REQUEST_FILENAME} !-d
  ##   RewriteRule . /index.php [L]
  ##   </IfModule>
  ##   # END WordPress
  ## ```
  htaccess: ""

  ## @param wordpress.htaccessConfigMap string Name of ConfigMap containing .htaccess (key: htaccess, overrides wordpress.htaccess)
  htaccessConfigMap: ""

  ## @param wordpress.debug bool Enable WordPress debugging (WP_DEBUG)
  debug: false

  ## @param wordpress.debugDisplay bool Render PHP warnings/notices into the page (WP_DEBUG_DISPLAY). Keep false in production so errors never leak into the response body. Only applies when debug=true.
  debugDisplay: false

  ## @param wordpress.debugLog bool Write debug output to wp-content/debug.log (WP_DEBUG_LOG). Only applies when debug=true.
  debugLog: false

  ## @param wordpress.muPluginsConfigMaps list ConfigMaps containing MU-Plugin files (name, optional key)
  ## E.g.
  ## ```yaml
  ## muPluginsConfigMaps:
  ##   - name: my-mu-plugin
  ##     key: my-plugin.php
  ##   - name: another-mu-plugin  # mounts all keys from ConfigMap
  ## ```
  muPluginsConfigMaps: []

  ## @section SMTP / Mail
  ## @descriptionStart
  ## Configures WordPress mail delivery via a mu-plugin that overrides PHPMailer settings
  ## directly from environment variables. The password is mounted from existingSecret
  ## or set inline via password (not recommended for production).
  ##
  ## Example with Gmail:
  ## ```yaml
  ## wordpress:
  ##   smtp:
  ##     enabled: true
  ##     host: smtp.gmail.com
  ##     port: 587
  ##     encryption: tls
  ##     fromEmail: noreply@example.com
  ##     fromName: "My Site"
  ##     auth: true
  ##     username: noreply@example.com
  ##     existingSecret: gmail-smtp
  ##     existingSecretPasswordKey: password
  ## ```
  ## @descriptionEnd
  smtp:
    ## @param wordpress.smtp.enabled bool Enable SMTP configuration via MU-plugin
    enabled: false
    ## @param wordpress.smtp.host string SMTP server hostname
    host: ""
    ## @param wordpress.smtp.port int SMTP server port (25, 465, 587)
    port: 587
    ## @param wordpress.smtp.encryption string Encryption method (tls, ssl, or empty for none)
    encryption: tls
    ## @param wordpress.smtp.fromEmail string From address (use existingSecretFromEmailKey to avoid plain-text in values)
    fromEmail: ""
    ## @param wordpress.smtp.fromName string Display name in From header
    fromName: ""
    ## @param wordpress.smtp.auth bool Use SMTP authentication
    auth: true
    ## @param wordpress.smtp.username string SMTP auth username (use existingSecretUsernameKey to avoid plain-text in values)
    username: ""
    ## @param wordpress.smtp.password string SMTP auth password (use existingSecret in production)
    password: ""
    ## @param wordpress.smtp.existingSecret string Name of existing Secret containing SMTP credentials
    existingSecret: ""
    ## @param wordpress.smtp.existingSecretPasswordKey string Key in existingSecret for the SMTP password
    existingSecretPasswordKey: "password"
    ## @param wordpress.smtp.existingSecretUsernameKey string Key in existingSecret for the SMTP username (overrides username when set)
    existingSecretUsernameKey: ""
    ## @param wordpress.smtp.existingSecretFromEmailKey string Key in existingSecret for the From address (overrides fromEmail when set)
    existingSecretFromEmailKey: ""

## @section Apache parameters
## @descriptionStart
## Custom Apache configuration for site, ports, and PHP.
## E.g.
## ```yaml
## apache:
##   customDefaultSiteConfig: |
##     <VirtualHost *:80>
##       ServerAdmin webmaster@localhost
##       DocumentRoot /var/www/html
##       <Directory /var/www/html>
##         AllowOverride All
##       </Directory>
##     </VirtualHost>
##
##   customPhpConfig: |
##     upload_max_filesize = 64M
##     post_max_size = 64M
##     max_execution_time = 300
## ```
## @descriptionEnd
apache:
  ## @param apache.serverName string Apache ServerName (defaults to host from wordpress.url when empty)
  serverName: ""

  ## @param apache.customDefaultSiteConfig string Custom Apache default site config (000-default.conf)
  customDefaultSiteConfig: ""

  ## @param apache.customDefaultSiteConfigMap string Name of ConfigMap containing default site config (key: 000-default.conf)
  customDefaultSiteConfigMap: ""

  ## @param apache.customPortsConfig string Custom Apache ports config (ports.conf)
  customPortsConfig: ""

  ## @param apache.customPortsConfigMap string Name of ConfigMap containing ports config (key: ports.conf)
  customPortsConfigMap: ""

  ## @param apache.customPhpConfig string Custom PHP config
  customPhpConfig: ""

  ## @param apache.customPhpConfigMap string Name of ConfigMap containing PHP config (key: custom.ini)
  customPhpConfigMap: ""

  ## PHP OPcache tuning. Rendered as a dedicated conf.d drop-in (zz-opcache.ini) that loads
  ## LAST — after the official image's opcache-recommended.ini — so these values win.
  ## Tune via apache.opcache.* (not apache.customPhpConfig). Tuned defaults benefit every
  ## install (PHP/image defaults of 128 MB / 4000 files are too small for WordPress + plugins).
  opcache:
    ## @param apache.opcache.enabled bool Render tuned PHP OPcache settings
    enabled: true
    ## @param apache.opcache.memoryConsumption int Shared opcode cache size in MB (opcache.memory_consumption)
    memoryConsumption: 192
    ## @param apache.opcache.internedStringsBuffer int Interned strings buffer in MB (opcache.interned_strings_buffer)
    internedStringsBuffer: 16
    ## @param apache.opcache.maxAcceleratedFiles int Max cached files (opcache.max_accelerated_files); WordPress + many plugins = lots of PHP files
    maxAcceleratedFiles: 20000
    ## @param apache.opcache.revalidateFreq int Seconds between timestamp checks (opcache.revalidate_freq); raise on shared/network FS to reduce stat load
    revalidateFreq: 2
    ## @param apache.opcache.validateTimestamps bool Re-check file mtimes (opcache.validate_timestamps); false = max performance but requires a restart to pick up code changes
    validateTimestamps: true

## @section Storage parameters
storage:
  ## @param storage.mode string Volume layout. "full" (default) mounts the PVC / per-Pod volume at all of /var/www/html. "wp-content" keeps the WordPress core on an ephemeral emptyDir (re-copied from the image each start, ~seconds) and persists only wp-content on the PVC / per-Pod volume — makes pods stateless and fast to reschedule. Pair with an object cache and offloaded uploads (e.g. S3) for true HA. Requires consistent auth keys (auto-pinned by the chart for this mode).
  mode: full
  ## @param storage.existingClaim string Name of an existing PVC to use
  existingClaim: ""
  ## @param storage.storageClass string Storage class for PVC (required when not using existingClaim)
  storageClass: ""
  ## @param storage.size string Size of PVC (required when not using existingClaim)
  size: 1Gi
  ## @param storage.accessModes list Access modes for PVC
  accessModes:
    - ReadWriteOnce
  ## @param storage.annotations object Annotations to add to PVC
  annotations: {}
  ## @param storage.labels object Labels to add to PVC
  labels: {}
  ## @param storage.selector object Selector for PVC
  selector: {}
  ## @param storage.resourcePolicy string Resource policy of PVC (keep or delete)
  resourcePolicy: keep

## @section ServiceAccount configuration
serviceAccount:
  ## @param serviceAccount.create bool Specifies whether a service account should be created
  create: true
  ## @param serviceAccount.automount bool Automatically mount ServiceAccount API credentials. Default false (the WordPress pod needs no Kubernetes API access); the chart forces it on automatically when the Application Password feature must write a Secret via the SA.
  automount: false
  ## @param serviceAccount.annotations object Annotations to add to the service account
  annotations: {}
  ## @param serviceAccount.name string Name of the service account (generated if not set and create is true)
  name: ""

## @section Pod parameters

## @param podAnnotations object Annotations to add to pods
podAnnotations: {}

## @param podLabels object Labels to add to pods
podLabels: {}

## @section Security Context parameters
## @descriptionStart
## Pod and container security options.
## For debian based images: fsGroup 33, for alpine: fsGroup 82.
## E.g.
## ```yaml
## podSecurityContext:
##   fsGroup: 33
##   runAsUser: 33
##   runAsNonRoot: true
##   seccompProfile:
##     type: RuntimeDefault
##
## containerSecurityContext:
##   readOnlyRootFilesystem: true
##   allowPrivilegeEscalation: false
##   privileged: false
##   capabilities:
##     drop:
##       - ALL
## ```
## @descriptionEnd
podSecurityContext:
  fsGroup: 33
  fsGroupChangePolicy: "Always"
  runAsUser: 33
  runAsGroup: 33
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

## @param containerSecurityContext object Security context for the container
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  privileged: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
  runAsNonRoot: true

## @param containerPorts object Container ports (http, https)
containerPorts:
  http: 8080
  https: 8443

## @section Service configuration
service:
  ## @param service.type string Service type (NodePort, LoadBalancer, ClusterIP)
  type: NodePort
  ## @param service.ports object Service ports (http, https)
  ports:
    http: 80
    https: 443
  ## @param service.nodePorts object NodePorts (choose between 30000-32767)
  nodePorts:
    http:
    https:
