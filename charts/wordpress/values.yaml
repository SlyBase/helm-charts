    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  ## @section MariaDB Persistence
  persistence:
    ## @param mariadb.persistence.enabled bool Enable MariaDB data persistence
    enabled: true
    ## @param mariadb.persistence.storageClass string Storage class for MariaDB PVC
    storageClass: ""
    ## @param mariadb.persistence.accessModes list PVC access modes
    accessModes:
      - ReadWriteOnce
    ## @param mariadb.persistence.size string PVC size
    size: 1Gi
    ## @param mariadb.persistence.annotations object PVC annotations
    annotations: {}
    ## @param mariadb.persistence.selector object PVC selector
    selector: {}

## @section Memcached configuration
## @descriptionStart
## For all values see: https://artifacthub.io/packages/helm/cloudpirates-memcached/memcached?modal=values
## Cache backends are mutually exclusive: enable at most one of memcached.enabled, redis.enabled, valkey.enabled.
## @descriptionEnd
memcached:
  ## @param memcached.enabled bool Enable Memcached chart installation
  enabled: false

  ## @param memcached.createConfig bool Create wp-config.php Memcached configuration
  createConfig: true

  ## @param memcached.cacheKeySalt string Cache key salt for Memcached object cache isolation
  ## @descriptionStart
  ## If empty, chart generates a random salt on first deploy and persists it in Secret.
  ## On upgrades, the existing salt is reused automatically.
  ## @descriptionEnd
  cacheKeySalt: ""

  ## @section Existing Secret for memcached cache key salt
  cacheKeySaltSecret:
    ## @param memcached.cacheKeySaltSecret.name string Name of existing Secret containing cache key salt
    name: ""
    ## @param memcached.cacheKeySaltSecret.key string Key in Secret containing cache key salt value
    key: "WP_CACHE_KEY_SALT"

  ## @param memcached.serverGroups object Optional cache-group mapping to Memcached server lists
  ## @descriptionStart
  ## Explicit mapping for rendering $memcached_servers.
  ## Keys are cache group names, values are lists of host:port entries.
  ## If empty, chart falls back to embedded Memcached service DNS and port for group 'default'.
  ## Example:
  ##   default:
  ##     - memcached-a:11211
  ##   options:
  ##     - memcached-b:11211
  ## @descriptionEnd
  serverGroups: {}

  ## @param memcached.nameOverride string String to partially override memcached.fullname
  nameOverride: ""
  ## @param memcached.fullnameOverride string String to fully override memcached.fullname
  fullnameOverride: ""
  ## @param memcached.commonLabels object Labels to add to all deployed objects
  commonLabels: {}
  ## @param memcached.commonAnnotations object Annotations to add to all deployed objects
  commonAnnotations: {}

  ## @section Memcached Image
  image:
    ## @param memcached.image.registry string Memcached image registry
    registry: ""
    ## @param memcached.image.repository string Memcached image repository
    repository: docker.io/memcached
    ## @param memcached.image.tag string Memcached image tag
    tag: "1.6.45@sha256:5ddbe11a3c72cd5f404cd2e2f7b7984721c397b636e9faea53196c719def924d"
    ## @param memcached.image.pullPolicy string Memcached image pull policy
    pullPolicy: IfNotPresent

  ## @param memcached.replicaCount int Number of Memcached replicas
  replicaCount: 1

  ## @section Memcached Service
  service:
    ## @param memcached.service.type string Kubernetes service type
    type: ClusterIP
    ## @param memcached.service.port int Memcached service port
    port: 11211

  ## @section Memcached Security Context
  containerSecurityContext:
    ## @param memcached.containerSecurityContext.runAsUser int User ID to run the container
    runAsUser: 11211
    ## @param memcached.containerSecurityContext.runAsNonRoot bool Run as non-root user
    runAsNonRoot: true
    ## @param memcached.containerSecurityContext.allowPrivilegeEscalation bool Allow privilege escalation
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

## @section Redis configuration
## @descriptionStart
## For all values see: https://artifacthub.io/packages/helm/cloudpirates-redis/redis?modal=values
## @descriptionEnd
redis:
  ## @param redis.enabled bool Enable Redis chart installation
  enabled: false

  ## @param redis.createConfig bool Create wp-config.php Redis configuration
  createConfig: true

  ## @param redis.cacheKeySalt string Cache key salt for Redis object cache isolation
  ## @descriptionStart
  ## If empty, chart generates a random salt on first deploy and persists it in Secret.
  ## On upgrades, the existing salt is reused automatically.
  ## @descriptionEnd
  cacheKeySalt: ""

  ## @section Existing Secret for redis cache key salt
  cacheKeySaltSecret:
    ## @param redis.cacheKeySaltSecret.name string Name of existing Secret containing cache key salt
    name: ""
    ## @param redis.cacheKeySaltSecret.key string Key in Secret containing cache key salt value
    key: "WP_CACHE_KEY_SALT"

  ## @section Redis Authentication
  ## @descriptionStart
  ## Authentication is handled by the Redis subchart.
  ## If auth is enabled and no password/secret is provided, the Redis chart generates a random password
  ## and stores it in the Redis secret (default key: redis-password).
  ## WordPress will automatically read that secret and inject WP_REDIS_PASSWORD.
  ## @descriptionEnd
  auth:
    ## @param redis.auth.password string Explicit Redis password (optional)
    password: ""
    ## @param redis.auth.existingSecret string Existing Secret containing Redis password (optional)
    existingSecret: ""
    ## @param redis.auth.existingSecretPasswordKey string Key in existing Secret for Redis password
    existingSecretPasswordKey: "redis-password"

  ## @section Redis Object Cache Scaling
  ## @descriptionStart
  ## Advanced Redis Object Cache topologies (rhubarbgroup/redis-cache):
  ## - replication: uses WP_REDIS_SERVERS + WP_REDIS_CLIENT=predis
  ## - sharding: uses WP_REDIS_SHARDS + WP_REDIS_CLIENT=phpredis
  ## - sentinel: uses WP_REDIS_SENTINEL + WP_REDIS_SERVERS + WP_REDIS_CLIENT=predis
  ## - cluster: uses WP_REDIS_CLUSTER + WP_REDIS_CLIENT=phpredis
  ## @descriptionEnd
  scaling:
    ## @param redis.scaling.type string Scaling mode: none|replication|sharding|sentinel|cluster
    type: "none"
    ## @param redis.scaling.servers list Server URIs for replication/sentinel mode
    ## Example: tcp://redis-0.redis:6379?database=0&role=master
    servers: []
    ## @param redis.scaling.sentinel string Sentinel master/service name (required for sentinel mode)
    sentinel: ""
    ## @param redis.scaling.shards list Server URIs for sharding mode
    shards: []
    ## @param redis.scaling.cluster list Server URIs for cluster mode
    cluster: []

  ## @param redis.nameOverride string String to partially override redis.fullname
  nameOverride: ""
  ## @param redis.fullnameOverride string String to fully override redis.fullname
  fullnameOverride: ""
  ## @param redis.commonLabels object Labels to add to all deployed objects
  commonLabels: {}
  ## @param redis.commonAnnotations object Annotations to add to all deployed objects
  commonAnnotations: {}

  ## @section Redis Image
  image:
    ## @param redis.image.registry string Redis image registry
    registry: ""
    ## @param redis.image.repository string Redis image repository
    repository: docker.io/redis
    ## @param redis.image.tag string Redis image tag
    tag: "8.8.0-trixie@sha256:e24be9c810185d280b7246dfaa3afe2e92735a2495a2fdc9dcdfdd8c85fa8cd6"
    ## @param redis.image.pullPolicy string Redis image pull policy
    pullPolicy: IfNotPresent

  ## @param redis.replicaCount int Number of Redis replicas
  replicaCount: 1

  ## @section Redis Service
  service:
    ## @param redis.service.type string Kubernetes service type
    type: ClusterIP
    ## @param redis.service.port int Redis service port
    port: 6379

  ## @param redis.topologySpreadConstraints list Topology spread constraints for Redis pods
  topologySpreadConstraints: []

  ## @section Redis Security Context
  containerSecurityContext:
    ## @param redis.containerSecurityContext.runAsUser int User ID to run the container
    runAsUser: 999
    ## @param redis.containerSecurityContext.runAsGroup int Group ID to run the container
    runAsGroup: 999
    ## @param redis.containerSecurityContext.runAsNonRoot bool Run as non-root user
    runAsNonRoot: true
    ## @param redis.containerSecurityContext.allowPrivilegeEscalation bool Allow privilege escalation
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

