## @section Metrics configuration
metrics:
  ## @section WordPress Metrics
  ## @descriptionStart
  ## Metrics exported via WordPress plugin with ServiceMonitor for Prometheus
  ## @descriptionEnd
  wordpress:
    ## @param metrics.wordpress.enabled bool Enable WordPress metrics
    enabled: false
    ## @param metrics.wordpress.installPlugin bool Install the WordPress exporter plugin
    installPlugin: true
    ## @param metrics.wordpress.pluginNameOverride string Override the plugin name to install
    pluginNameOverride: ""
    ## @param metrics.wordpress.networkActivate bool Network-activate the metrics plugin in WordPress Multisite (default: true)
    networkActivate: true
    ## @param metrics.wordpress.autoupdate bool Enable automatic updates for the metrics plugin (default: true)
    autoupdate: true

    ## @section WordPress ServiceMonitor
    serviceMonitor:
      ## @param metrics.wordpress.serviceMonitor.annotations object Annotations for the ServiceMonitor
      annotations: {}
      ## @param metrics.wordpress.serviceMonitor.labels object Labels for the ServiceMonitor
      labels: {}
      ## @param metrics.wordpress.serviceMonitor.selector object Selector for the ServiceMonitor
      selector: {}
      ## @param metrics.wordpress.serviceMonitor.interval string Scrape interval
      interval: 30s
      ## @param metrics.wordpress.serviceMonitor.namespace string Namespace for ServiceMonitor (defaults to release namespace)
      namespace: ""
      ## @param metrics.wordpress.serviceMonitor.ports list Ports to scrape metrics from
      ports:
        - http
      ## @param metrics.wordpress.serviceMonitor.metricsPath string Path to scrape metrics from
      metricsPath: /slymetrics/metrics
      ## @param metrics.wordpress.serviceMonitor.existingSecret string Existing secret with Bearer Token (key: wordpress.metrics.token)
      existingSecret: ""
      ## @param metrics.wordpress.serviceMonitor.secretKey string Key in existing secret for Bearer Token
      secretKey: "wordpress.metrics.token"
      ## @param metrics.wordpress.serviceMonitor.token string Alternative authentication token (ignored if existingSecret is set)
      token: ""

    ## @section Grafana Dashboard
    grafanaDashboard:
      ## @param metrics.wordpress.grafanaDashboard.enabled bool Deploy Grafana dashboard ConfigMap
      enabled: false
      ## @param metrics.wordpress.grafanaDashboard.namespace string Namespace for dashboard ConfigMap (defaults to release namespace)
      namespace: ""
      ## @param metrics.wordpress.grafanaDashboard.customLabels object Additional labels for dashboard ConfigMap
      customLabels: {}

  ## @section Apache Metrics
  ## @descriptionStart
  ## Uses Apache Exporter sidecar to expose metrics
  ## @descriptionEnd
  apache:
    ## @param metrics.apache.enabled bool Enable Apache metrics
    enabled: false
    ## @param metrics.apache.createConfig bool Create .htaccess and 000-default.conf config for exporter
    createConfig: true

    ## @section Apache Exporter Image
    image:
      ## @param metrics.apache.image.registry string Container image registry
      registry: docker.io
      ## @param metrics.apache.image.repository string Apache exporter image repository
      repository: lusotycoon/apache-exporter
      ## @param metrics.apache.image.pullPolicy string Image pull policy
      pullPolicy: IfNotPresent
      ## @param metrics.apache.image.tag string Image tag
      tag: "v1.1.1@sha256:438b1b6177eb0ef6c22aad003f671ad1ee1872b28e08addbd9197abcd84c9d5c"

    ## @section Apache Exporter Probes
    ## @descriptionStart
    ## All three probes use tcpSocket (not httpGet) intentionally.
    ## httpGet on /metrics triggers a synchronous scrape of server-status, which can
    ## block indefinitely if Apache is momentarily slow (e.g. during cron or autoupdates),
    ## causing the probe to time out even though the exporter process is healthy.
    ## tcpSocket simply checks that the exporter is listening, which is the correct semantic
    ## for liveness/readiness. Actual scrape health is monitored by Prometheus.
    ## @descriptionEnd
    livenessProbe:
      ## @param metrics.apache.livenessProbe.enabled bool Enable liveness probe
      enabled: true
      ## @param metrics.apache.livenessProbe.initialDelaySeconds int Initial delay for liveness probe
      initialDelaySeconds: 15
      ## @param metrics.apache.livenessProbe.periodSeconds int Period for liveness probe
      periodSeconds: 10
      ## @param metrics.apache.livenessProbe.timeoutSeconds int Timeout for liveness probe
      timeoutSeconds: 5
      ## @param metrics.apache.livenessProbe.failureThreshold int Failure threshold for liveness probe
      failureThreshold: 5
      ## @param metrics.apache.livenessProbe.successThreshold int Success threshold for liveness probe
      successThreshold: 1

    readinessProbe:
      ## @param metrics.apache.readinessProbe.enabled bool Enable readiness probe
      enabled: true
      ## @param metrics.apache.readinessProbe.initialDelaySeconds int Initial delay for readiness probe
      initialDelaySeconds: 5
      ## @param metrics.apache.readinessProbe.periodSeconds int Period for readiness probe
      periodSeconds: 10
      ## @param metrics.apache.readinessProbe.timeoutSeconds int Timeout for readiness probe
      timeoutSeconds: 5
      ## @param metrics.apache.readinessProbe.failureThreshold int Failure threshold for readiness probe
      failureThreshold: 5
      ## @param metrics.apache.readinessProbe.successThreshold int Success threshold for readiness probe
      successThreshold: 1

    startupProbe:
      ## @param metrics.apache.startupProbe.enabled bool Enable startup probe
      enabled: true
      ## @param metrics.apache.startupProbe.initialDelaySeconds int Initial delay for startup probe
      initialDelaySeconds: 10
      ## @param metrics.apache.startupProbe.periodSeconds int Period for startup probe
      periodSeconds: 10
      ## @param metrics.apache.startupProbe.timeoutSeconds int Timeout for startup probe
      timeoutSeconds: 5
      ## @param metrics.apache.startupProbe.failureThreshold int Failure threshold for startup probe
      failureThreshold: 15
      ## @param metrics.apache.startupProbe.successThreshold int Success threshold for startup probe
      successThreshold: 1

    ## @param metrics.apache.customLivenessProbe object Override default liveness probe
    customLivenessProbe: {}

    ## @param metrics.apache.customReadinessProbe object Override default readiness probe
    customReadinessProbe: {}

    ## @param metrics.apache.customStartupProbe object Override default startup probe
    customStartupProbe: {}

    ## @param metrics.apache.resources object Resource limits and requests
    resources: {}

    ## @section Apache Exporter Service
    service:
      ## @param metrics.apache.service.type string Service type
      type: ClusterIP
      ## @param metrics.apache.service.ports object Service ports
      ports:
        metrics: 9117
      ## @param metrics.apache.service.nodePorts object NodePorts
      nodePorts:
        metrics:
      ## @param metrics.apache.service.clusterIP string Static cluster IP
      clusterIP: ""
      ## @param metrics.apache.service.annotations object Service annotations
      annotations: {}
      ## @param metrics.apache.service.labels object Service labels
      labels: {}

    ## @section Apache Exporter Security Context
    containerSecurityContext:
      seLinuxOptions: {}
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
      privileged: false
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: "RuntimeDefault"

    ## @section Apache ServiceMonitor
    serviceMonitor:
      ## @param metrics.apache.serviceMonitor.enabled bool Create ServiceMonitor for Prometheus
      enabled: true
      ## @param metrics.apache.serviceMonitor.annotations object Annotations for ServiceMonitor
      annotations: {}
      ## @param metrics.apache.serviceMonitor.labels object Labels for ServiceMonitor
      labels: {}
      ## @param metrics.apache.serviceMonitor.selector object Selector for ServiceMonitor
      selector: {}
      ## @param metrics.apache.serviceMonitor.interval string Scrape interval
      interval: 30s
      ## @param metrics.apache.serviceMonitor.metricsPath string Path to scrape metrics from
      metricsPath: /metrics
      ## @param metrics.apache.serviceMonitor.namespace string Namespace for ServiceMonitor (defaults to release namespace)
      namespace: ""

  ## @section PrometheusRule
  prometheusRule:
    ## @param metrics.prometheusRule.enabled bool Create a PrometheusRule (requires metrics.apache or metrics.wordpress enabled)
    enabled: false
    ## @param metrics.prometheusRule.namespace string Namespace where the PrometheusRule is created (default: release namespace)
    namespace: ""
    ## @param metrics.prometheusRule.additionalLabels object Labels for Prometheus Operator selector (e.g. release: kube-prometheus-stack)
    additionalLabels: {}
    defaultRules:
      ## @param metrics.prometheusRule.defaultRules.podDown bool Enable WordPressPodDown alert
      podDown: true
      ## @param metrics.prometheusRule.defaultRules.apacheScrapeFailing bool Enable scrape-failure and busy-worker alerts (requires metrics.apache.enabled)
      apacheScrapeFailing: true
    ## @param metrics.prometheusRule.extraRules list Additional alerting rules appended verbatim
    extraRules: []

## @section Backup
backup:
  ## @param backup.enabled bool Create a CronJob that backs up the database (and optionally wp-content) to a PVC
  enabled: false
  ## @param backup.includeFiles bool Also tar wp-content into the backup (requires a RWX PVC or snapshotting — set false when using RWO storage)
  includeFiles: false
  ## @param backup.schedule string Cron schedule (UTC)
  schedule: "0 2 * * *"
  ## @param backup.retentionDays int Delete local backups older than N days
  retentionDays: 14
  ## @param backup.successfulJobsHistoryLimit int Number of successful job records to keep
  successfulJobsHistoryLimit: 3
  ## @param backup.failedJobsHistoryLimit int Number of failed job records to keep
  failedJobsHistoryLimit: 1
  ## @param backup.backoffLimit int Number of retries before marking the backup job failed
  backoffLimit: 2
  ## @section Backup image
  image:
    ## @param backup.image.registry string Image registry
    registry: ""
    ## @param backup.image.repository string Image repository
    repository: docker.io/mariadb
    ## @param backup.image.tag string Image tag
    tag: "12.3.2-noble@sha256:628f228f0fd5913a220438693576b29b6fe4dc1fa0a1298c0e98579fae28635f"
    ## @param backup.image.pullPolicy string Image pull policy
    pullPolicy: IfNotPresent
  ## @param backup.resources object Resource requests/limits for the backup container
  resources: {}
  ## @section Backup PVC
  persistence:
    ## @param backup.persistence.enabled bool Create a PVC for backup storage
    enabled: true
    ## @param backup.persistence.existingClaim string Use an existing PVC instead of creating one
    existingClaim: ""
    ## @param backup.persistence.size string Size of the backup PVC
    size: 10Gi
    ## @param backup.persistence.accessModes list Access modes for the backup PVC
    accessModes: [ReadWriteOnce]
    ## @param backup.persistence.storageClass string Storage class for the backup PVC
    storageClass: ""
  ## @section Backup S3 (rclone)
  s3:
    ## @param backup.s3.enabled bool Push backups to S3 via rclone after each run
    enabled: false
    ## @section Backup S3 image
    image:
      ## @param backup.s3.image.repository string rclone image repository
      repository: rclone/rclone
      ## @param backup.s3.image.tag string rclone image tag
      tag: "1.74@sha256:c61954aaa32328a5486715dd063a81c7879f5195ad3505cd362deddd509dc4a1"
      ## @param backup.s3.image.pullPolicy string Pull policy for rclone image
      pullPolicy: IfNotPresent
    ## @param backup.s3.existingSecret string Secret containing key rclone.conf with the configured remote
    existingSecret: ""
    ## @param backup.s3.remote string rclone remote name (must match rclone.conf)
    remote: "s3"
    ## @param backup.s3.bucket string S3 bucket name
    bucket: ""
    ## @param backup.s3.path string Sub-path inside the bucket
    path: "wordpress-backups"
    ## @section Custom CA certificate for S3 connections
    ca:
      ## @param backup.s3.ca.existingSecret string Name of an existing secret containing the CA certificate
      existingSecret: ""
      ## @param backup.s3.ca.existingSecretKey string Key in the secret that holds the CA certificate (PEM)
      existingSecretKey: ""
  ## @section Backup restore
  ## @descriptionStart
  ## One-shot restore of a previous backup created by the backup CronJob. Workflow:
  ##   1. set `backup.restore.enabled=true` and `backup.restore.timestamp=<dir>` (the YYYYMMDD-HHMMSS
  ##      folder name under the backup PVC, or in S3 when `fromS3=true`),
  ##   2. `helm upgrade` — a Job restores the DB (and wp-content if the backup included files),
  ##   3. set `backup.restore.enabled=false` again so it does not re-run on the next upgrade.
  ## The Job runs as a pre-upgrade/pre-install hook so it completes before the WordPress pods roll.
  ## @descriptionEnd
  restore:
    ## @param backup.restore.enabled bool Run a one-shot restore Job (remember to disable again afterwards)
    enabled: false
    ## @param backup.restore.timestamp string Backup folder to restore (YYYYMMDD-HHMMSS). Empty = newest available
    timestamp: ""
    ## @param backup.restore.fromS3 bool Pull the backup from S3 (rclone) before restoring instead of reading the backup PVC
    fromS3: false
    ## @param backup.restore.backoffLimit int Number of retries before marking the restore Job failed
    backoffLimit: 1
  ## @section Backup VolumeSnapshot
  ## @descriptionStart
  ## Declarative CSI VolumeSnapshot of the WordPress data PVC (needs the external-snapshotter CRDs and
  ## a VolumeSnapshotClass). Renders a new VolumeSnapshot on each `helm upgrade`; combine with your
  ## storage backend's retention policy to prune old snapshots.
  ## @descriptionEnd
  volumeSnapshot:
    ## @param backup.volumeSnapshot.enabled bool Create a VolumeSnapshot of the WordPress data PVC
    enabled: false
    ## @param backup.volumeSnapshot.className string VolumeSnapshotClass to use (empty = cluster default)
    className: ""
    ## @param backup.volumeSnapshot.labels object Extra labels for the VolumeSnapshot
    labels: {}

