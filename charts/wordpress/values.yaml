  annotations: {}
  ## @param service.labels object Additional labels for service
  labels: {}

## @section HTTPRoute configuration
## @descriptionStart
## HTTPRoute configuration for WordPress.
## E.g.
## ```yaml
## httpRoute:
##   enabled: true
##   parentRefs:
##     - name: my-gateway
## ```
## @descriptionEnd
httpRoute:
  # @param httpRoute.enabled bool Enable HTTPRoute resource for Gateway API
  enabled: false
  # @param httpRoute.annotations object Annotations for HTTPRoute resource
  annotations: {}
  # @param httpRoute.labels object Additional labels for HTTPRoute resource
  labels: {}
  # @param httpRoute.parentRefs list Parent references (REQUIRED when enabled - HTTPRoute will not work without this)
  # Example:
  # parentRefs:
  #   - name: my-gateway
  #     namespace: gateway-namespace
  parentRefs: []
  # @param httpRoute.hostnames list Hostnames for the HTTPRoute
  # Example:
  # hostnames:
  #   - wordpress.example.com
  hostnames: []
  # @param httpRoute.rules list Custom routing rules (optional, defaults to path prefix /)
  # If not specified, a default rule routing all traffic to the service is used
  rules: []
  # Example custom rules:
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /wordpress
  #     backendRefs:
  #       - name: my-release-wordpress
  #         port: 80

## @section Ingress configuration
## @descriptionStart
## Ingress configuration for WordPress.
## E.g.
## ```yaml
## ingress:
##   enabled: true
##   className: nginx
##   annotations:
##     cert-manager.io/cluster-issuer: letsencrypt
##     nginx.ingress.kubernetes.io/proxy-body-size: "64m"
##   hosts:
##     - host: wordpress.example.com
##       paths:
##         - path: /
##           pathType: Prefix
##   tls:
##     - secretName: wordpress-tls
##       hosts:
##         - wordpress.example.com
## ```
## @descriptionEnd
ingress:
  ## @param ingress.enabled bool Enable ingress
  enabled: false
  ## @param ingress.className string Ingress class name
  className: ""
  ## @param ingress.annotations object Ingress annotations
  annotations: {}
  ## @param ingress.hosts list Ingress hosts configuration
  hosts:
    - host: wordpress.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  ## @param ingress.tls list Ingress TLS configuration
  tls: []
  ## @param ingress.useHttpsBackend bool Use HTTPS backend (service.ports.https instead of http)
  useHttpsBackend: false
  ## @param ingress.extraRules list Additional ingress rules
  extraRules: []
  ## @param ingress.secondary list Additional named Ingress objects with independent className, annotations, and TLS.
  ## Useful for admin-only or geo-routed hostnames.
  ## E.g.
  ## ```yaml
  ## ingress:
  ##   secondary:
  ##     - name: admin
  ##       enabled: true
  ##       className: nginx
  ##       annotations:
  ##         nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8"
  ##         cert-manager.io/cluster-issuer: letsencrypt-prod
  ##       hosts:
  ##         - host: admin.example.com
  ##           paths:
  ##             - path: /
  ##               pathType: Prefix
  ##       tls:
  ##         - secretName: wp-admin-tls
  ##           hosts: [admin.example.com]
  ## ```
  secondary: []

## @section NetworkPolicy parameters
networkPolicy:
  ## @param networkPolicy.enabled bool Create a NetworkPolicy for the WordPress pod
  enabled: false
  ## @param networkPolicy.allowExternalEgress bool Allow egress to public Internet (needed for wp-cli plugin/theme downloads and SMTP)
  allowExternalEgress: true
  ## @param networkPolicy.smtpPorts list TCP ports opened on external egress for SMTP
  smtpPorts: [587]
  ## @param networkPolicy.annotations object Additional annotations for the NetworkPolicy
  annotations: {}
  ingress:
    ## @param networkPolicy.ingress.from list Ingress sources (empty = allow all). Use podSelector/namespaceSelector for nginx-ingress etc.
    from: []
    ## @param networkPolicy.ingress.extraRules list Extra raw ingress rule blocks appended verbatim
    extraRules: []
  egress:
    ## @param networkPolicy.egress.extraRules list Extra raw egress rule blocks appended verbatim
    extraRules: []

