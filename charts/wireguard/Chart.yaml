apiVersion: v2
name: wireguard
description: >-
  Using the offical linuxserver/wireguard image with almost any environment
  variables for K8S. Supporting server and client mode.
type: application
version: 1.0.1
appVersion: 1.0.20250521-r1-ls113
icon: >-
  https://raw.githubusercontent.com/slydlake/helm-charts/refs/heads/main/charts/wireguard/app.png
home: https://github.com/slydlake/helm-charts
maintainers:
  - name: slydlake
sources:
  - https://github.com/slydlake/helm-charts
annotations:
  artifacthub.io/category: security
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: SlyCharts GitHub Repository
      url: https://github.com/slydlake/helm-charts/tree/main/charts/wireguard
    - name: Offical WireGuard Repository
      url: https://github.com/linuxserver/docker-wireguard
  artifacthub.io/maintainers: |
    - name: slydlake
      email: sly.dlake@gmail.com
  artifacthub.io/changes: |
    - kind: changed
      description: "wireguard: serviceAccount.automount now defaults to false. The chart never talks to the Kubernetes API, so the ServiceAccount token no longer needs to be automounted. Set serviceAccount.automount: true to restore the previous behavior."
    - kind: added
      description: "wireguard: add NetworkPolicy, PDB, commonLabels/Annotations and scheduling controls"
      links:
        - name: GitHub
          url: https://github.com/SlyBase/helm-charts/commit/2d7edc537ed6b721dedf9eff28d201710f1af6b9
    - kind: added
      description: "wireguard: harden pod/container security defaults"
      links:
        - name: GitHub
          url: https://github.com/SlyBase/helm-charts/commit/46375bfdf048a63d5880b91a94ad76f84b6e794f
  artifacthub.io/containsSecurityUpdates: false
  artifacthub.io/images: |
    - name: wireguard
      image: docker.io/linuxserver/wireguard:1.0.20250521-r1-ls113
keywords:
  - wireguard
  - vpn
  - linuxserver
