suite: Deployment rendering and securityContext defaults

tests:
  - it: renders a single Deployment with the wireguard container
    template: deployment.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].name
          value: wireguard
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: wireguard

  - it: defaults the pod securityContext to PUID/PGID
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: defaults the container securityContext for client mode (server.enabled=false)
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 0
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: NET_ADMIN
      - notContains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: SYS_MODULE

  - it: defaults the container securityContext for server mode
    template: deployment.yaml
    set:
      wireguard:
        server:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: NET_ADMIN

  - it: adds SYS_MODULE only when loadKernelModule is enabled
    template: deployment.yaml
    set:
      wireguard:
        loadKernelModule: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: SYS_MODULE

  - it: allows overriding the container securityContext
    template: deployment.yaml
    set:
      securityContext:
        privileged: false
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop:
            - ALL
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: allows overriding the pod securityContext
    template: deployment.yaml
    set:
      podSecurityContext:
        fsGroup: 2000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2000
      - notExists:
          path: spec.template.spec.securityContext.runAsUser
